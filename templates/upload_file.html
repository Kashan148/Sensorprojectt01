<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wafer fault detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            line-height: 1.6;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        h2 {
            font-size: 20px;
            margin-bottom: 20px;
        }
        .upload-container {
            margin-top: 20px;
        }
        input[type="file"] {
            margin-bottom: 15px;
            display: block;
        }
        button {
            padding: 5px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Upload CSV for the prediction</h1>
    <h2>Drop file to upload</h2>

    <div class="upload-container">
        <form action="/predict" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept=".csv">
            <button type="submit">Upload file</button>
        </form>
    </div>

</body>
</html>
